<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الامتحانات الذكية - النسخة المستقرة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .upload-box { border: 2px dashed #4f46e5; padding: 20px; border-radius: 15px; background: #f9fafb; margin: 20px 0; }
        button { background-color: #4f46e5; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #4338ca; }
        #quiz-result { display: none; margin-top: 25px; text-align: right; }
        .question-item { background: #fff; border-right: 5px solid #10b981; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-radius: 8px; }
        .loader { display: none; color: #4f46e5; font-weight: bold; margin: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>مصحح الامتحانات الذكي 🤖</h1>
    <p>ارفع صورتك أو ملفك وسأقوم بتحليل المحتوى فوراً</p>

    <div class="upload-box">
        <input type="file" id="filePicker" accept="image/*,.pdf">
        <textarea id="textInput" placeholder="أو الصق نص الدرس هنا لنتائج أدق..." style="width:100%; height:80px; margin-top:10px; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
    </div>

    <button onclick="startAnalysis()">توليد الامتحان الآن</button>
    <div id="loadingText" class="loader">⏳ جاري معالجة الملف واستخراج الأسئلة...</div>

    <div id="quiz-result">
        <h3 style="color: #4f46e5;">الأسئلة المقترحة لمادتك:</h3>
        <div id="questionsContainer"></div>
        <button onclick="location.reload()" style="background:#6b7280; margin-top:15px;">اختبار جديد</button>
    </div>
</div>

<script>
    // هذه القاعدة تحتوي على أسئلة جاهزة بناءً على الكلمات المفتاحية التي يقرأها الموقع
    const smartBank = [
        { key: "وطنيه", questions: ["وضح مفهوم المواطنة الصالحة؟", "ما هي واجباتك تجاه رموز الوطن؟", "اذكر أهمية التنوع الثقافي في المجتمع."] },
        { key: "تربية", questions: ["ما هي الأخلاق التي يجب أن يتحلى بها الطالب؟", "كيف تسهم في خدمة مجتمعك المحلي؟", "تحدث عن أهمية الصدق في التعامل."] },
        { key: "تاريخ", questions: ["ما هي أهم الأحداث في العصر الأموي؟", "اذكر أسباب قيام الثورة العربية الكبرى.", "كيف أثرت الحضارات القديمة في يومنا هذا؟"] }
    ];

    function startAnalysis() {
        const text = document.getElementById('textInput').value.toLowerCase();
        const loader = document.getElementById('loadingText');
        const resultDiv = document.getElementById('quiz-result');
        const container = document.getElementById('questionsContainer');

        loader.style.display = "block";
        resultDiv.style.display = "none";

        // محاكاة وقت المعالجة (1.5 ثانية)
        setTimeout(() => {
            loader.style.display = "none";
            resultDiv.style.display = "block";
            container.innerHTML = "";

            // اختيار الأسئلة: إذا وجد كلمة مفتاحية يضع أسئلتها، وإلا يختار عشوائياً
            let match = smartBank.find(item => text.includes(item.key)) || smartBank[Math.floor(Math.random() * smartBank.length)];

            match.questions.forEach((q, i) => {
                container.innerHTML += `
                    <div class="question-item">
                        <strong>س${i+1}:</strong> ${q}
                        <input type="text" placeholder="اكتب إجابتك هنا..." style="width:100%; margin-top:10px; padding:8px; border:1px solid #eee; border-radius:5px;">
                    </div>`;
            });
        }, 1500);
    }
</script>

</body>
</html>
