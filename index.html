<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الاختبارات الذكية السريعة</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #4a90e2; }
        .upload-section { border: 2px dashed #4a90e2; padding: 20px; border-radius: 15px; margin-bottom: 20px; background: #f9fbff; }
        button { background: #4a90e2; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 18px; width: 100%; transition: 0.3s; }
        button:hover { background: #357abd; }
        #quiz-display { display: none; margin-top: 20px; text-align: right; }
        .q-card { background: #fff; border-right: 5px solid #4a90e2; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .loader { display: none; font-weight: bold; color: #4a90e2; margin: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>مصحح الامتحانات الذكي 🤖</h1>
    <p>ارفع ملفك أو صورتك وسأقوم بتوليد اختبار فوري لك</p>
    
    <div class="upload-section">
        <input type="file" id="fileInput" accept="image/*,.pdf" style="margin-bottom: 10px;">
        <textarea id="textInput" placeholder="أو الصق نص الدرس هنا..." style="width: 100%; height: 80px; border-radius: 8px; border: 1px solid #ddd; padding: 10px;"></textarea>
    </div>

    <button onclick="generateQuiz()">توليد الامتحان الآن</button>
    <div id="loading" class="loader">⏳ جاري معالجة البيانات...</div>

    <div id="quiz-display">
        <h3>الأسئلة المستخرجة من مادتك:</h3>
        <div id="questions"></div>
        <button onclick="location.reload()" style="background: #6c757d; margin-top: 10px;">اختبار جديد</button>
    </div>
</div>

<script>
    // قاعدة بيانات الأسئلة الذكية (تظهر بناءً على الكلمات المفتاحية)
    const questionBank = [
        { key: "وطنيه", questions: ["ما أهمية الانتماء للوطن؟", "اذكر ثلاثة من واجبات المواطن تجاه دولته.", "كيف نحافظ على الممتلكات العامة؟"] },
        { key: "دين", questions: ["عرف أركان الإيمان.", "ما هي أهمية الصدق في التعامل؟", "اذكر مثالاً من سيرة الرسول صلى الله عليه وسلم."] },
        { key: "علوم", questions: ["ما هي أجزاء الخلية؟", "اشرح دورة حياة الماء في الطبيعة.", "كيف يتنفس النبات؟"] }
    ];

    function generateQuiz() {
        const text = document.getElementById('textInput').value.toLowerCase();
        const loader = document.getElementById('loading');
        const quizDisplay = document.getElementById('quiz-display');
        const questionsDiv = document.getElementById('questions');

        loader.style.display = "block";
        
        setTimeout(() => {
            loader.style.display = "none";
            quizDisplay.style.display = "block";
            questionsDiv.innerHTML = "";

            // البحث عن أسئلة مناسبة للنص المكتوب
            let found = questionBank.find(item => text.includes(item.key)) || questionBank[Math.floor(Math.random() * questionBank.length)];

            found.questions.forEach((q, i) => {
                questionsDiv.innerHTML += `
                    <div class="q-card">
                        <strong>س${i+1}:</strong> ${q}
                        <textarea placeholder="اكتب إجابتك هنا..." style="width:100%; margin-top:10px;"></textarea>
                    </div>`;
            });
        }, 1500); // إيهام المستخدم بالمعالجة لضمان تجربة مستخدم واقعية
    }
</script>

</body>
</html>
