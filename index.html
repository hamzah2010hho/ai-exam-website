<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحح الذكي - دعم الصور والـ PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #4f46e5; text-align: center; font-size: 22px; }
        .card { border: 2px dashed #d1d5db; padding: 20px; border-radius: 12px; text-align: center; background: #f9fafb; margin-bottom: 20px; }
        input[type="file"] { width: 100%; margin-bottom: 10px; }
        button { background-color: #4f46e5; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:disabled { background-color: #9ca3af; }
        .status { margin: 15px 0; text-align: center; font-weight: bold; color: #4f46e5; display: none; }
        #result-area { display: none; background: #f3f4f6; padding: 15px; border-radius: 10px; margin-top: 20px; border-right: 5px solid #10b981; }
    </style>
</head>
<body>

<div class="container">
    <h1>مصحح الامتحانات الذكي 🤖</h1>
    <div class="card">
        <p>ارفع صورة للدرس أو ملف PDF</p>
        <input type="file" id="upload-input" accept="image/*,application/pdf">
        <p style="font-size: 12px; color: #666;">(ملاحظة: إذا كان الملف كبيراً، سنعالج أول صفحة فقط للسرعة)</p>
    </div>

    <button id="action-btn" onclick="startProcess()">توليد الأسئلة الآن</button>
    <div id="loader" class="status">⌛ جاري استخراج النص من الملف...</div>

    <div id="result-area">
        <h3 style="margin-top:0;">الأسئلة المقترحة:</h3>
        <div id="output-text"></div>
        <button onclick="location.reload()" style="background:#6b7280; margin-top:10px;">تجربة ملف آخر</button>
    </div>
</div>

<script>
    const HF_KEY = "hf_QpTCEDrPhxVa0IPqoPxCJRbLwzkc0aQYkq"; 
    const MODEL_NAME = "MistralAI/Mistral-7B-Instruct-v0.2";

    async function startProcess() {
        const fileInput = document.getElementById('upload-input');
        const btn = document.getElementById('action-btn');
        const loader = document.getElementById('loader');

        if (fileInput.files.length === 0) return alert("الرجاء اختيار ملف أولاً!");

        const file = fileInput.files[0];
        btn.disabled = true;
        loader.style.display = "block";
        
        try {
            let extractedText = "";
            
            if (file.type === "application/pdf") {
                loader.innerText = "⌛ جاري قراءة ملف الـ PDF...";
                extractedText = await parsePDF(file);
            } else {
                loader.innerText = "⌛ جاري تحليل الصورة (OCR)...";
                extractedText = await parseImage(file);
            }

            if (!extractedText || extractedText.length < 5) throw new Error("لم نتمكن من استخراج نص واضح.");

            loader.innerText = "🤖 نرسل النص للذكاء الاصطناعي...";
            await getAIQuestions(extractedText);

        } catch (err) {
            alert("خطأ: " + err.message);
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }

    async function parsePDF(file) {
        const data = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data}).promise;
        const page = await pdf.getPage(1); // نأخذ الصفحة الأولى فقط للسرعة
        const content = await page.getTextContent();
        return content.items.map(i => i.str).join(" ");
    }

    async function parseImage(file) {
        const result = await Tesseract.recognize(file, 'ara+eng');
        return result.data.text;
    }

    async function getAIQuestions(text) {
        const prompt = `<s>[INST] أنت معلم خبير. بناءً على هذا النص، استخرج 3 أسئلة تعليمية مهمة باللغة العربية: ${text.substring(0, 1000)} [/INST]`;
        
        const resp = await fetch(`https://api-inference.huggingface.co/models/${MODEL_NAME}`, {
            headers: { Authorization: `Bearer ${HF_KEY}`, "Content-Type": "application/json" },
            method: "POST",
            body: JSON.stringify({ inputs: prompt })
        });
        
        const data = await resp.json();
        let finalOutput = data[0].generated_text.split("[/INST]")[1] || data[0].generated_text;
        
        document.getElementById('output-text').innerText = finalOutput;
        document.getElementById('result-area').style.display = "block";
    }
</script>

</body>
</html>
