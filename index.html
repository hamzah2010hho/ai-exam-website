<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الامتحانات الذكية - دعم PDF</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 30px; }
        .setup-box { border: 2px dashed #cbd5e0; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; background: #fafafa; }
        textarea { width: 100%; height: 120px; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-top: 10px; resize: none; box-sizing: border-box; }
        button { background-color: #1a73e8; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .loading { display: none; text-align: center; color: #1a73e8; font-weight: bold; margin: 20px 0; }
        #quiz-section, #result-section { display: none; margin-top: 30px; }
        .question-card { background: #fff; padding: 20px; border-right: 6px solid #1a73e8; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .evaluation-text { white-space: pre-line; line-height: 1.6; background: #e8f0fe; padding: 20px; border-radius: 10px; }
        input[type="file"] { margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>مصحح الامتحانات الذكي (PDF) 🤖</h1>
    
    <div id="setup-section">
        <div class="setup-box">
            <p><strong>الخطوة 1:</strong> ارفع ملف الدرس (PDF)</p>
            <input type="file" id="pdf-file" accept=".pdf">
            <p>أو الصق النص هنا مباشرة:</p>
            <textarea id="material-text" placeholder="انسخ محتوى الدرس هنا..."></textarea>
        </div>
        <button id="start-btn" onclick="handleStart()">توليد الامتحان الآن</button>
    </div>

    <div id="loading-spinner" class="loading">⏳ جاري معالجة البيانات وتوليد الأسئلة...</div>

    <div id="quiz-section">
        <h2 style="color: #1a73e8;">الأسئلة المستخرجة:</h2>
        <div id="questions-container"></div>
        <button onclick="submitAnswers()" style="background-color: #34a853;">إرسال الإجابات للتصحيح</button>
    </div>

    <div id="result-section">
        <h2 style="color: #34a853;">التقييم النهائي:</h2>
        <div id="evaluation-content" class="evaluation-text"></div>
        <button onclick="location.reload()" style="background-color: #70757a;">إعادة المحاولة / درس جديد</button>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // تم تصحيح السطر أدناه:
    const API_KEY = "AIzaSyDcrz-Vmobvt-zTE0_gTZh1BtcDentNU8U"; 
    let generatedQuestions = [];

    async function extractTextFromPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            fullText += content.items.map(item => item.str).join(" ") + " ";
        }
        return fullText;
    }

    async function handleStart() {
        const fileInput = document.getElementById('pdf-file');
        const textArea = document.getElementById('material-text');
        let contentToProcess = "";

        if (fileInput.files.length > 0) {
            toggleLoading(true);
            contentToProcess = await extractTextFromPDF(fileInput.files[0]);
        } else if (textArea.value.trim() !== "") {
            contentToProcess = textArea.value;
        } else {
            alert("يرجى رفع ملف PDF أو لصق نص المادة التعليمية.");
            return;
        }
        generateQuiz(contentToProcess);
    }

    async function generateQuiz(text) {
        toggleLoading(true);
        const prompt = `بناءً على المادة التالية، قم بتوليد 3 أسئلة متنوعة (مقالي، أكمل، استنتاجي). ارسل الإجابة بصيغة JSON فقط كقائمة: [{"id": 1, "question": "نص السؤال"}]. النص: ${text.substring(0, 10000)}`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            let rawText = data.candidates[0].content.parts[0].text;
            const cleanJson = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
            generatedQuestions = JSON.parse(cleanJson);
            renderQuiz();
        } catch (error) {
            alert("خطأ في المفتاح أو الاتصال.");
        } finally {
            toggleLoading(false);
        }
    }

    function renderQuiz() {
        const container = document.getElementById('questions-container');
        container.innerHTML = "";
        generatedQuestions.forEach((q, index) => {
            container.innerHTML += `<div class="question-card"><p><strong>س${index+1}:</strong> ${q.question}</p><textarea id="ans-${index}" style="height: 80px;"></textarea></div>`;
        });
        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
    }

    async function submitAnswers() {
        let answerData = "";
        generatedQuestions.forEach((q, index) => {
            const val = document.getElementById(`ans-${index}`).value;
            answerData += `السؤال: ${q.question} | إجابة الطالب: ${val}\n`;
        });
        toggleLoading(true);
        const evalPrompt = `أنت مصحح تعليمي. قم بتصحيح هذه الإجابات وأعطِ درجة من 10:\n${answerData}`;
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: evalPrompt }] }] })
            });
            const data = await response.json();
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('evaluation-content').innerText = data.candidates[0].content.parts[0].text;
        } catch (error) { alert("خطأ في التصحيح."); } finally { toggleLoading(false); }
    }

    function toggleLoading(show) {
        document.getElementById('loading-spinner').style.display = show ? 'block' : 'none';
        document.getElementById('start-btn').disabled = show;
    }
</script>
</body>
</html>
