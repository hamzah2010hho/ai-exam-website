<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة الكتب المدرسية الأردنية</title>
    <style>
        body { font-family: sans-serif; background: #eef2f3; text-align: center; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .btn { display: block; background: #3498db; color: white; padding: 15px; margin: 10px 0; text-decoration: none; border-radius: 8px; font-weight: bold; }
        .btn:hover { background: #2980b9; }
        .contact { margin-top: 30px; border-top: 1px solid #ddd; padding-top: 20px; }
        input, textarea { width: 90%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; }
        .send { background: #27ae60; border: none; cursor: pointer; color: white; }
    </style>
</head>
<body>

<div class="box">
    <h1>📚 مكتبة حمزة للكتب</h1>
    <p>اختر الصف لتحميل الكتب مباشرة:</p>

    <a href="https://elearning.jo/Pages/Books.aspx" class="btn">كتب الصف الرابع - السادس</a>
    <a href="https://elearning.jo/Pages/Books.aspx" class="btn">كتب الصف السابع - التاسع</a>
    <a href="https://elearning.jo/Pages/Books.aspx" class="btn">كتب العاشر - التوجيهي</a>

    <div class="contact">
        <h3>📧 أرسل اقتراحك لحمزة</h3>
        <form action="https://formspree.io/f/mldevqwv" method="POST">
            <input type="email" name="email" placeholder="إيميلك" required>
            <textarea name="message" placeholder="اكتب اقتراحك هنا"></textarea>
            <button type="submit" class="btn send">إرسال الاقتراح</button>
        </form>
    </div>
</div>

</body>
</html>
