<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الامتحانات الذكية - Hugging Face</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #6366f1; text-align: center; }
        .setup-box { border: 2px dashed #cbd5e0; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-top: 10px; box-sizing: border-box; }
        button { background-color: #6366f1; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 18px; transition: 0.3s; }
        button:hover { background-color: #4f46e5; }
        .loading { display: none; text-align: center; color: #6366f1; margin: 20px 0; font-weight: bold; }
        #quiz-section, #result-section { display: none; margin-top: 30px; }
        .question-card { background: #f8fafc; padding: 15px; border-right: 5px solid #6366f1; margin-bottom: 15px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>مصحح الامتحانات الذكي 🤖</h1>
    
    <div id="setup-section">
        <div class="setup-box">
            <p><strong>الخطوة 1:</strong> ارفع ملف الدرس (PDF) أو الصق النص:</p>
            <input type="file" id="pdf-file" accept=".pdf">
            <textarea id="material-text" placeholder="انسخ محتوى الدرس هنا..."></textarea>
        </div>
        <button id="start-btn" onclick="handleStart()">توليد الامتحان الآن</button>
    </div>

    <div id="loading-spinner" class="loading">⏳ جاري الاتصال بالذكاء الاصطناعي... (قد يستغرق 30 ثانية في المرة الأولى)</div>

    <div id="quiz-section">
        <h2 style="color: #6366f1;">الأسئلة المستخرجة:</h2>
        <div id="questions-container"></div>
        <button onclick="submitAnswers()" style="background-color: #10b981;">إرسال الإجابات للتصحيح</button>
    </div>

    <div id="result-section">
        <h2 style="color: #10b981;">التقييم والنتيجة:</h2>
        <div id="evaluation-content" style="white-space: pre-wrap; background: #f1f5f9; padding: 15px; border-radius: 8px; line-height: 1.6;"></div>
        <button onclick="location.reload()" style="margin-top:10px; background:#64748b;">اختبار درس جديد</button>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // مفتاح Hugging Face الخاص بك
    const HF_TOKEN = "hf_QpTCEDrPhxVa0IPqoPxCJRbLwzkc0aQYkq"; 
    const MODEL_ID = "HuggingFaceH4/zephyr-7b-beta";

    let generatedQuestions = [];

    async function extractTextFromPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            fullText += content.items.map(item => item.str).join(" ") + " ";
        }
        return fullText;
    }

    async function queryHF(prompt) {
        const response = await fetch(`https://api-inference.huggingface.co/models/${MODEL_ID}`, {
            headers: { Authorization: `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
            method: "POST",
            body: JSON.stringify({ inputs: prompt, parameters: { max_new_tokens: 500, return_full_text: false } }),
        });
        const result = await response.json();
        if (result.error) throw new Error(result.error);
        return result[0].generated_text;
    }

    async function handleStart() {
        const fileInput = document.getElementById('pdf-file');
        const textArea = document.getElementById('material-text');
        let content = "";

        if (fileInput.files.length > 0) {
            document.getElementById('loading-spinner').style.display = 'block';
            content = await extractTextFromPDF(fileInput.files[0]);
        } else {
            content = textArea.value;
        }

        if (!content.trim()) {
            alert("يرجى رفع ملف أو لصق نص أولاً!");
            return;
        }

        document.getElementById('loading-spinner').style.display = 'block';
        document.getElementById('start-btn').disabled = true;

        const prompt = `<|im_start|>system\nأنت معلم محترف. قم بتوليد 3 أسئلة متنوعة بناءً على النص. أجب بصيغة JSON فقط كقائمة: [{"question": "نص السؤال"}]<|im_end|>\n<|im_start|>user\nالنص: ${content.substring(0, 2500)}<|im_end|>\n<|im_start|>assistant\n`;

        try {
            const output = await queryHF(prompt);
            const jsonMatch = output.match(/\[.*\]/s);
            if (jsonMatch) {
                generatedQuestions = JSON.parse(jsonMatch[0]);
                renderQuiz();
            } else {
                throw new Error("Invalid format");
            }
        } catch (e) {
            alert("الموديل يستعد للعمل.. انتظر 20 ثانية ثم اضغط على الزر مرة أخرى.");
            console.error(e);
        } finally {
            document.getElementById('loading-spinner').style.display = 'none';
            document.getElementById('start-btn').disabled = false;
        }
    }

    function renderQuiz() {
        const container = document.getElementById('questions-container');
        container.innerHTML = "";
        generatedQuestions.forEach((q, i) => {
            container.innerHTML += `<div class="question-card"><p><strong>س${i+1}:</strong> ${q.question}</p><textarea id="ans-${i}" placeholder="اكتب إجابتك هنا..."></textarea></div>`;
        });
        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
    }

    async function submitAnswers() {
        let submission = "";
        generatedQuestions.forEach((q, i) => {
            submission += `السؤال: ${q.question}\nإجابة الطالب: ${document.getElementById(`ans-${i}`).value}\n\n`;
        });

        document.getElementById('loading-spinner').style.display = 'block';
        const evalPrompt = `<|im_start|>system\nأنت مصحح تعليمي. قم بتصحيح الإجابات التالية بوضوح وأعطِ نصيحة لكل سؤال ودرجة إجمالية.<|im_end|>\n<|im_start|>user\n${submission}<|im_end|>\n<|im_start|>assistant\n`;

        try {
            const evalResult = await queryHF(evalPrompt);
            document.getElementById('evaluation-content').innerText = evalResult;
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
        } catch (e) {
            alert("حدث خطأ أثناء التصحيح، يرجى المحاولة مرة أخرى.");
        } finally {
            document.getElementById('loading-spinner').style.display = 'none';
        }
    }
</script>
</body>
</html>
