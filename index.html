<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحح الذكي الشامل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2d3436; text-align: center; font-size: 24px; }
        .upload-area { border: 2px dashed #6c5ce7; padding: 20px; border-radius: 10px; text-align: center; background: #f9f9ff; margin-bottom: 20px; }
        button { background: #6c5ce7; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #a29bfe; }
        .loading { display: none; color: #6c5ce7; font-weight: bold; text-align: center; margin: 15px 0; }
        #quiz-section { display: none; margin-top: 20px; }
        textarea { width: 100%; height: 100px; margin-top: 10px; border-radius: 5px; border: 1px solid #ddd; padding: 10px; }
        .q-box { background: #f1f2f6; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-right: 4px solid #6c5ce7; }
    </style>
</head>
<body>

<div class="container">
    <h1>المصحح الذكي (صور + PDF) 🤖</h1>
    
    <div class="upload-area">
        <p>ارفع (كتاب PDF) أو (صورة درس) أو الصق نصاً:</p>
        <input type="file" id="file-input" accept=".pdf,image/*">
        <textarea id="manual-text" placeholder="أو الصق النص هنا مباشرة..."></textarea>
    </div>

    <button id="main-btn" onclick="processAll()">توليد الامتحان الآن</button>
    <div id="status" class="loading">⏳ جاري معالجة الملف واستخراج النص...</div>

    <div id="quiz-section">
        <div id="questions-list"></div>
        <button onclick="alert('قريباً: ميزة التصحيح التلقائي!')" style="background:#00b894; margin-top:10px;">إرسال الإجابات</button>
    </div>
</div>

<script>
    const HF_TOKEN = "hf_QpTCEDrPhxVa0IPqoPxCJRbLwzkc0aQYkq"; // مفتاحك
    const MODEL = "MistralAI/Mistral-7B-Instruct-v0.3"; 

    async function processAll() {
        const fileInput = document.getElementById('file-input');
        const manualText = document.getElementById('manual-text').value;
        const status = document.getElementById('status');
        let finalContext = "";

        status.style.display = "block";
        status.innerText = "⏳ جاري قراءة البيانات...";

        try {
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                if (file.type === "application/pdf") {
                    finalContext = await readPDF(file);
                } else {
                    finalContext = await readImage(file);
                }
            } else {
                finalContext = manualText;
            }

            if (!finalContext.trim()) throw new Error("لم نجد نصاً لمعالجته");

            status.innerText = "🤖 الذكاء الاصطناعي يكتب الأسئلة...";
            const questions = await askAI(finalContext);
            displayQuestions(questions);

        } catch (err) {
            alert("حدث خطأ: " + err.message);
        } finally {
            status.style.display = "none";
        }
    }

    async function readPDF(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        let text = "";
        // نكتفي بأول 5 صفحات فقط إذا كان الكتاب كبيراً لضمان السرعة
        const pagesToRead = Math.min(pdf.numPages, 5); 
        for (let i = 1; i <= pagesToRead; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            text += content.items.map(s => s.str).join(" ");
        }
        return text;
    }

    async function readImage(file) {
        const { data: { text } } = await Tesseract.recognize(file, 'ara+eng');
        return text;
    }

    async function askAI(context) {
        const prompt = `<s>[INST] أنت معلم عربي. استخرج 3 أسئلة فقط من هذا النص: ${context.substring(0, 1000)}. اجعل الإجابة قائمة بسيطة. [/INST]`;
        
        const response = await fetch(`https://api-inference.huggingface.co/models/${MODEL}`, {
            headers: { Authorization: `Bearer ${HF_TOKEN}`, "Content-Type": "application/json" },
            method: "POST",
            body: JSON.stringify({ inputs: prompt })
        });
        const result = await response.json();
        return result[0].generated_text.split("[/INST]")[1] || result[0].generated_text;
    }

    function displayQuestions(text) {
        const list = document.getElementById('questions-list');
        list.innerHTML = `<div class="q-box">${text.replace(/\n/g, '<br>')}</div>`;
        document.getElementById('quiz-section').style.display = "block";
    }
</script>
</body>
</html>
